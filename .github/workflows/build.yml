name: build

# Compila o app Tauri para Linux e Windows.
# Roda SÓ quando você quer gerar downloads — não em todo push:
#   - push de tag `v*` (ex.: v0.1.0): gera os instaladores e publica um Release.
#   - "Run workflow" (aba Actions): build manual sob demanda (só artefatos).
# Use o script `scripts/release.sh` para publicar uma nova versão.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Necessário para o softprops/action-gh-release criar a release em push de tag.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04 # glibc mais antiga = AppImage roda em mais distros
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    env:
      # russh -> aws-lc-sys precisa de NASM no Windows; usa os objetos pré-compilados
      # que a crate já traz (no-op no Linux).
      AWS_LC_SYS_PREBUILT_NASM: 1
    steps:
      - uses: actions/checkout@v4

      - name: Dependências de sistema (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev patchelf nasm

      - name: Toolchain Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache do Cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Dois workspaces independentes: o frontend (raiz) e o src-tauri.
          workspaces: |
            . -> target
            src-tauri -> target

      - name: Instalar cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Instalar trunk (binário pré-compilado)
        run: cargo binstall -y trunk

      # tauri-cli v2 nem sempre tem binário binstall-compatível; compilar do
      # source garante o subcomando `cargo tauri` no runner.
      - name: Instalar tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Verificar ferramentas
        run: |
          trunk --version
          cargo tauri --version

      - name: Build do app
        run: cargo tauri build

      - name: Publicar artefatos (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: hostdeck-linux
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Publicar artefatos (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: hostdeck-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Anexar à Release (somente em tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
